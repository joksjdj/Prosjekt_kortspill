<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cards</title>
</head>
<body>
    <h1>Lobbies</h1>
    <div class="lobbies column">
        <header class="border row" style="width: 100%; height: 50px; padding: 0%;">
            <input class="border" placeholder=" Search" style="width: 25%; height: 100%; background: none;"></input>
            <Button class="border" style="height: 100%;"><h2 style="margin: 0%;">Create lobby</h2></Button>
        </header>
        <main class="border" style="width: 100%; flex: 1;"></main>
        <footer style="display: flex; justify-content: center;">
            <div class="row">
                <button onclick="activeGames(-1)"><h1 id="pageMinus">&lt;</h1></button>
                <h1 id="pagenumber">1</h1>
                <button onclick="activeGames(1)"><h1>&gt;</h1></button>
            </div>
        </footer>
    </div>
</body>
</html>
<style>
.lobbies {
    width: 95%;
    min-height: 500px;
}
</style>
<script defer>
var page = 1;
async function activeGames(pagemove) {
    page += pagemove;
    if (page < 2) {
        document.getElementById("pageMinus").style.color = "gray";
        if (page === 0) {
            page = 1;
            return;
        }
    } else {
        document.getElementById("pageMinus").style.color = "white";
    }
    document.getElementById("pagenumber").innerText = page;
    
    await fetch(`/page/${page}/`)
        .then(response => response.text())
        .then(data => {
            console.log(data);
        })
        .catch(error => {
            console.error('Error fetching data:', error);
        });

}
activeGames(0);
</script>
