<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cards</title>
</head>
<body>
    <h1>Lobbies</h1>
    <div class="lobbies column">
        <header class="border row" style="width: 100%; height: 50px; padding: 0%;">
            <input class="border" placeholder=" Search" style="width: 25%; height: 100%; background: none;"></input>
            <Button class="border" style="height: 100%;"><h2 style="margin: 0%;">Create lobby</h2></Button>
        </header>
        <main style="width: 100%; flex: 1; box-sizing: border-box; display: flex; flex-direction: column;">
            <header class="border" style="width: 100%; height: 50px; display: flex; flex-direction: row;">
                <h2 class="border activeGamesRow" style="margin: 0%; width: 10%;">ID</h2>
                <h2 class="border activeGamesRow" style="margin: 0%; width: 70%; height: 100%;">Name</h2>
                <h2 class="border activeGamesRow" style="margin: 0%; width: 20%; height: 100%;">Players</h2>
            </header>
            <main id="activeGames" class="border" style="width: 100%; flex: 1;"></main>
        </main>
        <footer style="display: flex; justify-content: center;">
            <div class="row">
                <button id="pageMinus"><h1>&lt;</h1></button>
                <h1 id="pagenumber">1</h1>
                <button id="pagePlus"><h1>&gt;</h1></button>
            </div>
        </footer>
    </div>
</body>
</html>
<style>
.lobbies {
    width: 95%;
    min-height: 500px;
}
.activeGamesRow {
    margin: 0%;
    height: 100%;
    text-align: center;
    text-justify: center;
}
</style>
<script type="module" defer>
import { findActiveGames } from "./script.js";

var page = 1;
async function activeGames(pagemove) {
    page += pagemove;
    if (page < 2) {
        document.getElementById("pageMinus").style.color = "gray";
        if (page === 0) {
            page = 1;
            return;
        }
    } else {
        document.getElementById("pageMinus").style.color = "white";
    }
    document.getElementById("pagenumber").innerText = page;
    
    let activeGames = await findActiveGames(page);

    let activeGamesContainer = document.getElementById("activeGames");
    activeGamesContainer.innerHTML = "";

    activeGames.forEach(element => {
        activeGamesContainer.innerHTML += `
        <div class="border row" style="width: 100%; height: 20%; padding: 0%;" onclick="window.location.href = '/lobby/${element.id}/';">
            <h2 class="border activeGamesRow" style="margin: 0%; width: 10%; height: 100%;">${element.id}</h2>
            <h2 class="border activeGamesRow" style="margin: 0%; width: 70%; height: 100%;">${element.lobby_name}</h2>
            <h2 class="border activeGamesRow" style="margin: 0%; width: 20%; height: 100%;">${element.playing}</h2>
        </div>
        `
    });
}
activeGames(0);

document.getElementById("pageMinus").addEventListener("click", () => {
    activeGames(-1);
});
document.getElementById("pagePlus").addEventListener("click", () => {
    activeGames(1);
});
</script>
