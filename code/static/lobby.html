<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Cards</title>
</head>
<body>
    <h1>Lobbies</h1>
    <div class="lobbies column">
        <main style="width: 100%; flex: 1; box-sizing: border-box; display: flex; flex-direction: column;">
            <header class="border" style="width: 100%; height: 50px; display: flex; flex-direction: row;">
                <h2 class="border activeGamesRow" style="margin: 0%; width: 10%;">ID</h2>
                <h2 class="border activeGamesRow" style="margin: 0%; width: 90%; height: 100%;">Name</h2>
            </header>
            <main id="activeGames" class="border" style="width: 100%; flex: 1;"></main>
        </main>
    </div>
</body>
</html>
<style>
.lobbies {
    width: 95%;
    min-height: 500px;
}
.activeGamesRow {
    margin: 0%;
    height: 100%;
    text-align: center;
    text-justify: center;
}
</style>
<script type="module" defer>
import { findActiveGames } from "/static/script.js";
async function activeGames() {
    
    let activeGames = await findActiveGames(page);

    let activeGamesContainer = document.getElementById("activeGames");
    activeGamesContainer.innerHTML = "";

    activeGames.forEach(element => {
        activeGamesContainer.innerHTML += `
        <div class="border row" style="width: 100%; height: 20%; padding: 0%;">
            <h2 class="border activeGamesRow" style="margin: 0%; width: 10%; height: 100%;">${element.id}</h2>
            <h2 class="border activeGamesRow" style="margin: 0%; width: 70%; height: 100%;">${element.lobby_name}</h2>
            <h2 class="border activeGamesRow" style="margin: 0%; width: 20%; height: 100%;">${element.playing}</h2>
        </div>
        `
    });
}
</script>
